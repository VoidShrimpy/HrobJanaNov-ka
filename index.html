<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Pietni stranka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Themes */
body.svetly {
  --bg: #f7f3ec; --bg2: #ede8df; --text: #2a2218; --text-soft: #7a6e60;
  --gold: #9a7d4a; --gold-light: #c9aa72; --border: #c9b99a; --shadow: rgba(60,40,10,0.13);
}
body.tmavy {
  --bg: #141210; --bg2: #1e1a16; --text: #ede0cc; --text-soft: #9a8c7a;
  --gold: #c9a85c; --gold-light: #e0c47a; --border: #4a3e2e; --shadow: rgba(0,0,0,0.5);
}

/* Frame color presets */
body.ramecek-zlata   { --frame-outer: #b8a47e; --frame-inner: #e8dfc8; }
body.ramecek-stribrna{ --frame-outer: #909090; --frame-inner: #d8d8d8; }
body.ramecek-bila    { --frame-outer: #ddd;    --frame-inner: #f5f5f5; }
body.ramecek-cerna   { --frame-outer: #333;    --frame-inner: #666;    }

/* Fonts */
body.pismo-klasicke  { --font-d: 'EB Garamond', Georgia, serif;        --font-b: 'EB Garamond', Georgia, serif; }
body.pismo-elegantni { --font-d: 'Cinzel', 'Palatino Linotype', serif; --font-b: 'Cormorant Garamond', Georgia, serif; }
body.pismo-moderni   { --font-d: 'Cormorant Garamond', Georgia, serif; --font-b: 'Cormorant Garamond', Georgia, serif; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(180,150,80,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(180,150,80,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.card {
  position: relative;
  z-index: 1;
  max-width: 440px;
  width: 100%;
  background: var(--bg2);
  text-align: center;
  border: 1px solid var(--frame-outer);
  outline: 4px solid var(--frame-inner);
  outline-offset: -8px;
  box-shadow: 0 0 0 8px var(--frame-outer), 0 8px 40px var(--shadow), inset 0 0 60px rgba(0,0,0,0.03);
  padding: 40px 32px 36px;
  animation: fadeIn 1.2s ease both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Corner ornaments as inline SVG via JS */
.corner {
  position: absolute;
  width: 10px; height: 10px;
  opacity: 0.7;
}
.corner.tl { top: 12px;    left: 12px;  }
.corner.tr { top: 12px;    right: 12px; }
.corner.bl { bottom: 12px; left: 12px;  }
.corner.br { bottom: 12px; right: 12px; }

/* Symbol area */
.symbol-wrap {
  margin-bottom: 22px;
  animation: fadeIn 1.4s ease both;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.symbol-wrap svg { display: block; }

/* Slider */
.slider-wrap {
  position: relative;
  margin-bottom: 26px;
  animation: fadeIn 1.5s ease both;
}
.slider-frame {
  width: 100%;
  aspect-ratio: 4/3;
  overflow: hidden;
  border-radius: 12px;
  border: 1px solid var(--border);
  box-shadow: 0 4px 20px var(--shadow);
  background: var(--bg);
  position: relative;
}
.slider-frame img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.7s ease;
}
.slider-frame img.active { opacity: 1; }

.arrow {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,0.35);
  color: #fff; border: none;
  width: 36px; height: 36px;
  border-radius: 50%;
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
  transition: background 0.2s;
  backdrop-filter: blur(4px);
}
.arrow:hover { background: rgba(0,0,0,0.6); }
.arrow.left  { left: 10px; }
.arrow.right { right: 10px; }

.dots {
  display: flex; justify-content: center;
  gap: 6px; margin-top: 10px;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border);
  cursor: pointer;
  transition: background 0.2s, transform 0.2s;
}
.dot.active { background: var(--gold); transform: scale(1.3); }

/* Ornament line */
.ornament {
  display: flex; align-items: center;
  gap: 10px; margin: 20px 0 18px;
  animation: fadeIn 1.7s ease both;
}
.ornament::before, .ornament::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
}
.ornament span { color: var(--gold); font-size: 13px; letter-spacing: 4px; }

h1 {
  font-family: var(--font-d);
  font-size: clamp(1.4rem, 5vw, 1.9rem);
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.3;
  animation: fadeIn 1.8s ease both;
}

.dates {
  font-family: var(--font-b);
  font-size: 1.05rem;
  letter-spacing: 0.12em;
  color: var(--text-soft);
  font-style: italic;
  animation: fadeIn 1.9s ease both;
}

.venovani {
  font-family: var(--font-b);
  font-size: 1rem;
  line-height: 1.9;
  color: var(--text-soft);
  font-style: italic;
  animation: fadeIn 2s ease both;
}
</style>
</head>
<body>
<div class="card" id="card"></div>

<script src="config.js"></script>
<script>
(function () {
  var c = CONFIG;

  // Classes
  var tema    = (c.tema === 'tmavy') ? 'tmavy' : 'svetly';
  var pismo   = (['klasicke','elegantni','moderni'].indexOf(c.pismo) >= 0) ? c.pismo : 'elegantni';
  var ramecek = (['zlata','stribrna','bila','cerna'].indexOf(c.ramecek) >= 0) ? c.ramecek : 'zlata';
  document.body.className = tema + ' pismo-' + pismo + ' ramecek-' + ramecek;
  document.title = c.jmeno || 'Pietni stranka';

  // Custom colors override
  if (c.barvaPozadi) document.body.style.setProperty('--bg',   c.barvaPozadi);
  if (c.barvaKarty)  document.body.style.setProperty('--bg2',  c.barvaKarty);
  if (c.barvaTextu)  document.body.style.setProperty('--text', c.barvaTextu);

  // Gold color from frame for SVG
  var goldColor = getComputedStyle(document.body).getPropertyValue('--gold').trim() || '#9a7d4a';

  // SVG helpers – drawn shapes, no emoji, works on all iOS
  function svgKriz(size, color) {
    var s = size || 22; var col = color || goldColor;
    var w = 3;
    return '<svg width="' + s + '" height="' + s + '" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">'
      + '<rect x="' + (11-w/2) + '" y="1" width="' + w + '" height="20" rx="1" fill="' + col + '"/>'
      + '<rect x="1" y="' + (7-w/2) + '" width="20" height="' + w + '" rx="1" fill="' + col + '"/>'
      + '</svg>';
  }

  function svgKriz2(size, color) {
    // Patriarchal cross (double crossbar)
    var s = size || 24; var col = color || goldColor; var w = 2.5;
    return '<svg width="' + s + '" height="' + s + '" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">'
      + '<rect x="' + (12-w/2) + '" y="1" width="' + w + '" height="22" rx="1" fill="' + col + '"/>'
      + '<rect x="2"  y="' + (8-w/2)  + '" width="20" height="' + w + '" rx="1" fill="' + col + '"/>'
      + '<rect x="5"  y="' + (14-w/2) + '" width="14" height="' + w + '" rx="1" fill="' + col + '"/>'
      + '</svg>';
  }

  function svgHvezda(size, color) {
    var s = size || 22; var col = color || goldColor;
    return '<svg width="' + s + '" height="' + s + '" viewBox="0 0 22 22" fill="' + col + '" xmlns="http://www.w3.org/2000/svg">'
      + '<polygon points="11,1 13.5,8 21,8 15,13 17.5,20 11,15.5 4.5,20 7,13 1,8 8.5,8" />'
      + '</svg>';
  }

  function svgRohova(color) {
    var col = color || goldColor;
    return '<svg width="10" height="10" viewBox="0 0 10 10" fill="' + col + '" xmlns="http://www.w3.org/2000/svg">'
      + '<circle cx="5" cy="5" r="1.5"/>'
      + '<circle cx="1.5" cy="1.5" r="1"/>'
      + '<circle cx="8.5" cy="1.5" r="1"/>'
      + '<circle cx="1.5" cy="8.5" r="1"/>'
      + '<circle cx="8.5" cy="8.5" r="1"/>'
      + '</svg>';
  }

  // Build symbol HTML
  function buildSymbol() {
    var dot = '<span style="color:' + goldColor + ';font-size:0.5rem;line-height:22px;vertical-align:middle;">&bull;</span>';
    if (c.symbol === 'kriz2') return svgKriz2(24, goldColor) + dot + svgKriz2(24, goldColor);
    if (c.symbol === 'hvezda') return svgHvezda(22, goldColor) + dot + svgHvezda(22, goldColor);
    if (c.symbol === 'bez') return '';
    return svgKriz(22, goldColor) + dot + svgKriz(22, goldColor); // default
  }

  var card = document.getElementById('card');
  var html = '';

  // Corner ornaments
  var ro = svgRohova(goldColor);
  html += '<span class="corner tl">' + ro + '</span>';
  html += '<span class="corner tr">' + ro + '</span>';
  html += '<span class="corner bl">' + ro + '</span>';
  html += '<span class="corner br">' + ro + '</span>';

  // Symbol
  var sym = buildSymbol();
  if (sym) html += '<div class="symbol-wrap">' + sym + '</div>';

  // Fotky
  var fotky = [];
  if (c.fotky && c.fotky.length) {
    for (var x = 0; x < c.fotky.length; x++) {
      if (c.fotky[x]) fotky.push(c.fotky[x]);
    }
  }

  if (fotky.length > 0) {
    html += '<div class="slider-wrap"><div class="slider-frame" id="sf">';
    for (var i = 0; i < fotky.length; i++) {
      html += '<img src="' + fotky[i] + '" alt=""' + (i === 0 ? ' class="active"' : '') + '>';
    }
    html += '</div>';
    if (fotky.length > 1) {
      html += '<button class="arrow left" onclick="slide(-1)">&#8592;</button>';
      html += '<button class="arrow right" onclick="slide(1)">&#8594;</button>';
      html += '<div class="dots">';
      for (var j = 0; j < fotky.length; j++) {
        html += '<div class="dot' + (j === 0 ? ' active' : '') + '" onclick="goTo(' + j + ')"></div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }

  // Ornament
  html += '<div class="ornament"><span>&middot; &middot; &middot;</span></div>';

  // Jmeno
  html += '<h1>' + (c.jmeno || '') + '</h1>';

  // Datumy
  var d = '';
  if (c.narozeni) d += '* ' + c.narozeni;
  if (c.narozeni && c.umrti) d += '&nbsp;&nbsp;~&nbsp;&nbsp;&#8224;&nbsp;' + c.umrti;
  else if (c.umrti) d += '&#8224; ' + c.umrti;
  if (d) html += '<div class="dates">' + d + '</div>';

  // Venovani
  if (c.text) {
    html += '<div class="ornament" style="margin-top:18px"><span>&middot; &middot; &middot;</span></div>';
    html += '<div class="venovani">' + c.text.replace(/\n/g, '<br>') + '</div>';
  }

  card.innerHTML = html;

  // Slider
  var cur = 0;
  var imgs   = document.querySelectorAll('#sf img');
  var dotsEl = document.querySelectorAll('.dot');
  var total  = imgs.length;

  function goTo(n) {
    if (!total) return;
    imgs[cur].classList.remove('active');
    if (dotsEl[cur]) dotsEl[cur].classList.remove('active');
    cur = (n + total) % total;
    imgs[cur].classList.add('active');
    if (dotsEl[cur]) dotsEl[cur].classList.add('active');
  }

  window.goTo  = goTo;
  window.slide = function(dir) { goTo(cur + dir); };

  // Swipe
  var tx = null;
  document.addEventListener('touchstart', function(e) { tx = e.touches[0].clientX; });
  document.addEventListener('touchend',   function(e) {
    if (tx === null) return;
    var dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 40) window.slide(dx < 0 ? 1 : -1);
    tx = null;
  });

})();
</script>
</body>
</html>
